<!DOCTYPE html>
<!-- =============================================
     QueueSense - Elder Assistance Dashboard (Enterprise Version)
     ============================================= -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elder Assistance - QueueSense</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">

    <style>
        :root {
            --elder-accent: #39FF14;
            --elder-card-bg: rgba(255, 255, 255, 0.05);
            --elder-panel-blur: blur(20px);
        }

        body {
            background: var(--gradient-dark);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--gradient-dark);
            padding: 1.5rem;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2.5rem;
            max-width: 1400px;
            margin-right: auto;
        }

        .enterprise-card {
            background: var(--elder-card-bg);
            backdrop-filter: var(--elder-panel-blur);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .enterprise-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-primary);
        }

        /* Large Token Display */
        .token-hero {
            text-align: center;
            padding: 3rem 0;
        }

        .token-value {
            font-size: 10rem;
            font-weight: 900;
            color: var(--elder-accent);
            text-shadow: 0 0 60px rgba(57, 255, 20, 0.4);
            letter-spacing: -4px;
            line-height: 1;
            margin: 1rem 0;
        }

        .counter-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Stats Grid */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-md);
            padding: 1.75rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-panel:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
        }

        .stat-panel .val {
            font-size: 3rem;
            font-weight: 800;
            display: block;
            margin-bottom: 0.25rem;
        }

        .stat-panel .lbl {
            color: var(--text-purple-light);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Controls */
        .control-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .btn-action {
            height: 100px;
            border-radius: var(--radius-md);
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-call-solid {
            background: #0d6efd !important;
            color: white !important;
            border: none !important;
        }

        .btn-call-solid:hover {
            background: #0b5ed7 !important;
        }

        .btn-served-solid {
            background: #198754 !important;
            color: white !important;
            border: none !important;
        }

        .btn-served-solid:hover {
            background: #157347 !important;
        }

        .btn-noshow-solid {
            background: #dc3545 !important;
            color: white !important;
            border: none !important;
        }

        .btn-noshow-solid:hover {
            background: #bb2d3b !important;
        }

        .btn-repeat-solid {
            background: #6c757d !important;
            color: white !important;
            border: none !important;
        }

        .btn-repeat-solid:hover {
            background: #5c636a !important;
        }

        .btn-action:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        /* Sharp "Enterprise" Disabled State - Distinct Inactivity */
        .btn-action:disabled {
            opacity: 0.6 !important;
            background-color: #d1d5db !important;
            border-color: #9ca3af !important;
            color: #4b5563 !important;
            cursor: not-allowed !important;
            filter: none !important;
            box-shadow: none !important;
            transform: none !important;
        }

        /* Nav Branding */
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 0 2rem;
            color: var(--text-light);
            font-size: 1.25rem;
            font-weight: 700;
        }

        .sidebar-brand i {
            color: var(--neon-green);
        }

        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            color: var(--text-purple-light);
            border-radius: var(--radius-sm);
            margin-bottom: 0.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .sidebar-nav-item:hover,
        .sidebar-nav-item.active {
            background: rgba(57, 255, 20, 0.15);
            color: var(--neon-green);
        }

        .sidebar-nav-item.active {
            color: var(--neon-green);
            background: rgba(57, 255, 20, 0.05);
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 2rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-logout {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1.25rem;
            color: #ef4444;
            background: none;
            border: none;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            border-radius: var(--radius-sm);
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ff1744;
        }

        .service-picker {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-sm);
            font-weight: 600;
        }

        .service-picker option {
            background: #0f0c29;
        }

        .voice-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: var(--text-purple-light);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .voice-toggle.active {
            background: var(--elder-accent);
            color: var(--elder-bg);
            border-color: var(--elder-accent);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-layer-group"></i>
                <span>QueueSense</span>
            </div>

            <nav class="sidebar-nav mt-3">
                <a href="dashboard.html" class="sidebar-nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="queue-management.html" class="sidebar-nav-item">
                    <i class="fas fa-users-line"></i>
                    <span>Queue Management</span>
                </a>
                <a href="elder-assist.html" class="sidebar-nav-item active">
                    <i class="fas fa-hand-holding-heart"></i>
                    <span>Elder Assist</span>
                </a>
                <a href="appointments.html" class="sidebar-nav-item">
                    <i class="fas fa-calendar-check"></i>
                    <span>Appointments</span>
                </a>
                <a href="analytics.html" class="sidebar-nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Analytics</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h1 class="h2 fw-bold mb-1">Elder Assistant</h1>
                    <p class="text-muted small">Premium Management Console</p>
                </div>

                <div class="d-flex gap-3">
                    <select class="service-picker" id="locationSelect">
                        <option value="" disabled selected>Select Location</option>
                        <option value="sunrise">Sunrise Hospital, Ahmedabad</option>
                    </select>
                    <select class="service-picker" id="serviceSelect">
                        <!-- Populated by JS -->
                    </select>
                    <button class="voice-toggle active" id="voiceToggle" onclick="toggleVoice()">
                        <i class="fas fa-volume-high"></i><span id="voiceStatus">Voice ON</span>
                    </button>
                </div>
            </header>

            <!-- Current Token Display -->
            <div class="enterprise-card token-hero">
                <div class="token-display">
                    <!-- Restored Label -->
                    <div class="op-label">Now Serving</div>
                    <div class="token-value" id="currentToken">---</div>
                    <div id="currentName" class="h4 mb-3" style="color: rgba(255,255,255,0.7)">Waiting...</div>
                    <div class="counter-badge">
                        <i class="fas fa-desktop text-primary"></i>
                        Counter <span id="counterNum">1</span>
                    </div>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-panel">
                    <span class="val text-primary" id="waitingCount">0</span>
                    <span class="lbl">Waiting</span>
                </div>
                <div class="stat-panel">
                    <span class="val" id="yourPosition">#1</span>
                    <span class="lbl">Priority</span>
                </div>
                <div class="stat-panel">
                    <span class="val text-success" id="waitTime">~0m</span>
                    <span class="lbl">Avg Wait</span>
                </div>
            </div>

            <div class="control-grid">
                <!-- Call Next: Blue -->
                <button class="btn-action btn-call-solid" onclick="callNext()">
                    <i class="fas fa-bullhorn"></i>
                    <span>CALL NEXT</span>
                </button>
                <!-- Repeat: Dark Gray -->
                <button class="btn-action btn-repeat-solid" onclick="repeatAnnouncement()">
                    <i class="fas fa-volume-high"></i>
                    <span>REPEAT CALL</span>
                </button>
                <!-- Served: Green -->
                <button class="btn-action btn-served-solid" onclick="markServed()">
                    <i class="fas fa-check-double"></i>
                    <span>MARK SERVED</span>
                </button>
                <!-- No Show: Red -->
                <button class="btn-action btn-noshow-solid" onclick="markNoShow()">
                    <i class="fas fa-user-xmark"></i>
                    <span>NO SHOW</span>
                </button>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>

    <script>
        let state = {
            voiceEnabled: true,
            currentQueueEntry: null,
            selectedServiceId: 0,
            selectedLocationId: 0
        };

        async function toggleVoice() {
            state.voiceEnabled = !state.voiceEnabled;
            const btn = document.getElementById('voiceToggle');
            const status = document.getElementById('voiceStatus');
            if (state.voiceEnabled) {
                btn.classList.add('active');
                status.textContent = 'Voice ON';
            } else {
                btn.classList.remove('active');
                status.textContent = 'Voice OFF';
                Voice.stop();
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.isStaff()) return window.location.href = '../login.html';
            await loadServices();
            setupInitialState();
            await refreshDashboard();
            const poller = new Poller(refreshDashboard, 5000);
            poller.start();

            // Instant refresh when tab becomes active
            window.addEventListener('focus', () => {
                console.log('[App] Tab focused, refreshing...');
                refreshDashboard();
            });
        });

        async function loadServices() {
            const resp = await API.Services.getAll();
            if (resp.ok) {
                const sel = document.getElementById('serviceSelect');
                sel.innerHTML = '<option value="0">All Services</option>';
                resp.data.services.forEach(s => {
                    sel.innerHTML += `<option value="${s.service_id}">${s.service_name}</option>`;
                });
                // Default to All Services
                state.selectedServiceId = 0;
                state.selectedLocationId = 0;
            }
        }

        function logout() { Modal.confirm('Are you sure you want to log out?', () => Auth.logout()); }
        function setupInitialState() {
            const sid = document.getElementById('serviceSelect');
            sid.onchange = (e) => {
                state.selectedServiceId = parseInt(e.target.value);
                state.selectedLocationId = state.selectedServiceId; // 1-to-1 mapping
                refreshDashboard();
            };
        }

        async function refreshDashboard() {
            try {
                // Use Analytics for sync consistency with main dashboard
                const res = await API.Analytics.getDashboard({
                    service_id: state.selectedServiceId,
                    location_id: state.selectedLocationId
                });

                if (res.ok) {
                    // Sync: Use elder_waiting to match Dashboard
                    const elderWaiting = res.data.elder_waiting || 0;
                    document.getElementById('waitingCount').textContent = elderWaiting;
                    document.getElementById('waitTime').textContent = `~${elderWaiting * 5}m`;

                    // Restore state if we are currently serving someone
                    const qRes = await API.Queue.getStatus(state.selectedServiceId, state.selectedLocationId);
                    if (qRes.ok && !state.currentQueueEntry && qRes.data.currently_serving) {
                        const myEntry = qRes.data.currently_serving.find(x => x.counter === 1);
                        if (myEntry) {
                            state.currentQueueEntry = myEntry;
                            document.getElementById('currentToken').textContent = myEntry.token;
                            document.getElementById('currentName').textContent = myEntry.user_name || 'Customer';
                        }
                    }

                    // Dynamic Button States
                    const total = elderWaiting;
                    const btnCall = document.querySelector('.btn-call-solid');
                    const btnServed = document.querySelector('.btn-served-solid');
                    const btnNoShow = document.querySelector('.btn-noshow-solid');
                    const btnRepeat = document.querySelector('.btn-repeat-solid');
                    const isServing = !!state.currentQueueEntry;

                    if (btnCall) {
                        btnCall.disabled = (total === 0);
                        btnCall.title = (total === 0) ? "Queue is empty" : "Call Next Token";
                    }
                    if (btnServed) btnServed.disabled = !isServing;
                    if (btnNoShow) btnNoShow.disabled = !isServing;
                    if (btnRepeat) btnRepeat.disabled = !isServing;
                }
            } catch (e) {
                console.error('[Elder Sync] Failed:', e);
            }
        }

        async function callNext() {
            // Ensure service ID is always an integer
            const sid = parseInt(state.selectedServiceId) || 0; // Use 0 for All Services
            const lid = sid;

            // Double check safety check
            if (parseInt(document.getElementById('waitingCount').textContent) === 0) {
                Toast.info('No elders waiting');
                return;
            }

            console.log('[Elder Assist] Calling next for service:', sid);

            try {
                const r = await API.Queue.callNext(sid, lid, 1);
                console.log('[Elder Assist] API response:', r);
                if (r.ok) {
                    state.currentQueueEntry = r.data;
                    document.getElementById('currentToken').textContent = r.data.token;
                    document.getElementById('currentName').textContent = r.data.user_name || 'Customer';
                    Voice.announceToken(r.data.token, 1);
                    Toast.success(`Calling ${r.data.token}`);
                    refreshDashboard();
                } else {
                    Toast.info('Queue is clear for this service');
                    refreshDashboard();
                }
            } catch (e) {
                console.error('[Elder Assist] Error:', e);
                Toast.error('Server offline');
            }
        }

        async function clearCurrentService() {
            if (!state.currentQueueEntry) return;
            const res = await API.Queue.cancelCall(state.currentQueueEntry.queue_type, state.currentQueueEntry.queue_id);
            if (res.ok) {
                Toast.success('Service call cleared');
                state.currentQueueEntry = null;
                document.getElementById('currentToken').textContent = '---';
                document.getElementById('currentName').textContent = 'Waiting...';
                refreshDashboard();
            }
        }


        function repeatAnnouncement() {
            if (state.currentQueueEntry) {
                Voice.announceToken(state.currentQueueEntry.token, 1);
            }
        }

        async function markServed() {
            if (!state.currentQueueEntry) {
                Toast.warning('No active token to serve. Call Next first.');
                return;
            }
            console.log('[Elder Assist] Marking served:', state.currentQueueEntry);
            try {
                const r = await API.Queue.markServed(state.currentQueueEntry.queue_type, state.currentQueueEntry.queue_id);
                console.log('[Elder Assist] Serve response:', r);
                if (r.ok) {
                    Voice.stop();
                    document.getElementById('currentToken').textContent = '---';
                    state.currentQueueEntry = null;
                    Toast.success('Customer served');
                    refreshDashboard();
                } else {
                    Toast.error(r.data.error || 'Failed to mark served');
                }
            } catch (e) {
                console.error('[Elder Assist] Serve error:', e);
                Toast.error('Server connection failed');
            }
        }

        async function markNoShow() {
            if (!state.currentQueueEntry) {
                Toast.warning('No active token to mark as No Show.');
                return;
            }
            console.log('[Elder Assist] Marking No Show:', state.currentQueueEntry);
            try {
                const r = await API.Queue.markNoShow(state.currentQueueEntry.queue_type, state.currentQueueEntry.queue_id);
                if (r.ok) {
                    Voice.stop();
                    document.getElementById('currentToken').textContent = '---';
                    state.currentQueueEntry = null;
                    Toast.info('Marked as No Show');
                    refreshDashboard();
                } else {
                    Toast.error(r.data.error || 'Failed to mark No Show');
                }
            } catch (e) {
                console.error('[Elder Assist] No Show error:', e);
                Toast.error('Server connection failed');
            }
        }
    </script>
</body>

</html>
