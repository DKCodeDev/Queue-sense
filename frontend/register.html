<!DOCTYPE html>
<!-- =============================================
     QueueSense - Registration Page
     ============================================= -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - QueueSense</title>
    <meta name="description" content="Create your QueueSense account to start managing queues.">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">

    <style>
        /* Immersive Enterprise Layout - Matching Login */
        .register-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(26, 26, 46, 0.7), rgba(26, 26, 46, 0.7)),
                url('img/hero_smart_queue_system.png');
            background-size: cover;
            background-position: center;
            padding: 2rem;
            position: relative;
        }

        .register-card-container {
            display: flex;
            width: 100%;
            max-width: 1150px;
            height: 900px;
            /* adjusted for more form fields */
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3.5rem;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
            animation: fadeInUp 0.8s ease;
        }

        /* Left Visual Side */
        .register-visual-side {
            flex: 0.85;
            position: relative;
            background: url('img/hero_smart_queue_system.png');
            background-size: cover;
            background-position: center;
        }

        /* Right Form Side */
        .register-form-side {
            flex: 1.15;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 5rem;
            position: relative;
            overflow-y: auto;
            /* Allow scrolling if form is long */
        }

        .register-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Back Link - Matching Login */
        .back-link {
            position: absolute;
            top: 2.5rem;
            left: 2.5rem;
            color: #1a1a2e;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            transition: all 0.3s ease;
            z-index: 1000;
            padding: 0.85rem 1.5rem;
            border-radius: 1.25rem;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .back-link:hover {
            color: var(--neon-green);
            background: #ffffff;
            transform: translateX(-5px);
        }

        .register-logo {
            font-size: 3.5rem;
            color: var(--neon-green);
            margin-bottom: 1.5rem;
            text-align: center;
            filter: drop-shadow(0 0 15px rgba(57, 255, 20, 0.3));
        }

        .register-title {
            color: white;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-align: center;
            letter-spacing: -0.025em;
        }

        .register-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            text-align: center;
        }

        /* Forms Layout & Styles */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .register-form .form-label {
            color: var(--text-purple-light);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .register-form .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            padding: 0.875rem 1rem;
            border-radius: var(--radius-sm);
        }

        .register-form .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--neon-green);
            box-shadow: 0 0 0 3px rgba(57, 255, 20, 0.15);
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-right: none;
            color: var(--text-purple-light);
            padding: 0.875rem;
        }

        .input-group .form-control {
            border-left: none;
        }

        .password-requirements {
            font-size: 0.8rem;
            color: var(--text-purple-light);
            margin-top: 0.5rem;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .requirement.valid {
            color: var(--neon-green);
        }

        .register-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            margin-top: 1rem;
        }

        .login-link {
            text-align: center;
            color: var(--text-purple-light);
            margin-top: 1.5rem;
        }

        .login-link a {
            color: var(--neon-green);
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Alert styling */
        .alert {
            border-radius: var(--radius-sm);
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid rgba(57, 255, 20, 0.3);
            color: var(--neon-green);
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .form-row .form-group {
            flex: 1;
        }

        .elder-check {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: var(--radius-sm);
            padding: 1rem;
            margin-top: 0.5rem;
        }

        .elder-check .form-check-label {
            color: var(--text-purple-light);
        }

        .elder-check small {
            display: block;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.25rem;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .register-card-container {
                flex-direction: column;
                height: auto;
                max-width: 500px;
                border-radius: 2.5rem;
            }

            .register-visual-side {
                height: 250px;
                display: block;
            }

            .register-form-side {
                padding: 4rem 2rem;
            }

            .back-link {
                top: 1.5rem;
                left: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <!-- Back to Home Link (Modern Accessibility) -->
    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i>
        Back to Home
    </a>

    <!-- Registration Page Container -->
    <div class="register-page">
        <div class="register-card-container">
            <!-- Visual Side -->
            <div class="register-visual-side">
            </div>

            <!-- Form Side -->
            <div class="register-form-side">
                <div class="register-container">
                    <!-- Header -->
                    <div class="register-logo">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <h1 class="register-title">Create Account</h1>
                    <p class="register-subtitle">Join QueueSense for smarter queuing</p>

                    <!-- Alert for errors/success -->
                    <div id="registerAlert" class="alert" role="alert">
                        <span id="alertMessage"></span>
                    </div>

                    <!-- Registration Form -->
                    <form id="registerForm" class="register-form" novalidate>
                        <!-- Name and Age Row -->
                        <div class="form-row">
                            <div class="form-group">
                                <label for="name" class="form-label">Full Name *</label>
                                <input type="text" class="form-control" id="name" name="name"
                                    placeholder="Your full name" required>
                            </div>
                            <div class="form-group" style="max-width: 100px;">
                                <label for="age" class="form-label">Age</label>
                                <input type="number" class="form-control" id="age" name="age" placeholder="Age" min="1"
                                    max="120" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 3)">
                            </div>
                        </div>

                        <!-- Username Field -->
                        <div class="form-group">
                            <label for="username" class="form-label">Username *</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-user"></i>
                                </span>
                                <input type="text" class="form-control" id="username" name="username"
                                    placeholder="Choose a username" required>
                            </div>
                        </div>

                        <!-- Phone Field -->
                        <div class="form-group">
                            <label for="phone" class="form-label">Phone Number (Optional)</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-phone"></i>
                                </span>
                                <input type="tel" class="form-control" id="phone" name="phone"
                                    placeholder="10-digit phone number" maxlength="10"
                                    oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                            </div>
                        </div>

                        <!-- Password Field -->
                        <div class="form-group">
                            <label for="password" class="form-label">Password *</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock"></i>
                                </span>
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="Create a password" required>
                            </div>
                            <div class="password-requirements">
                                <div class="requirement invalid" id="reqLength">
                                    <i class="fas fa-circle"></i>
                                    8-16 characters
                                </div>
                                <div class="requirement invalid" id="reqSpecial">
                                    <i class="fas fa-circle"></i>
                                    At least 1 special character (!@#$%^&*)
                                </div>
                            </div>
                        </div>

                        <!-- Confirm Password Field -->
                        <div class="form-group">
                            <label for="confirmPassword" class="form-label">Confirm Password *</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock"></i>
                                </span>
                                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                                    placeholder="Confirm your password" required>
                            </div>
                        </div>

                        <!-- Elder Category (auto-detected by age) -->
                        <div class="elder-check" id="elderCheck" style="display: none;">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="isElder" checked disabled>
                                <label class="form-check-label" for="isElder">
                                    <i class="fas fa-heart"></i> Elder Priority Account
                                </label>
                                <small>You'll receive priority queue service and elder assistance.</small>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary register-btn btn-ripple" id="registerBtn">
                            <span id="btnText">Create Account</span>
                            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                        </button>
                    </form>

                    <!-- Login Link -->
                    <p class="login-link">
                        Already have an account? <a href="login.html">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Registration Script -->
    <script>
        // API Base URL - use relative path for same-origin requests
        const API_BASE = '';

        // Check age for elder status
        document.getElementById('age').addEventListener('input', function () {
            const age = parseInt(this.value);
            const elderCheck = document.getElementById('elderCheck');

            if (age >= 60) {
                elderCheck.style.display = 'block';
            } else {
                elderCheck.style.display = 'none';
            }
        });

        // Password validation with visual feedback
        document.getElementById('password').addEventListener('input', function () {
            const password = this.value;
            const reqLength = document.getElementById('reqLength');
            const reqSpecial = document.getElementById('reqSpecial');

            // Check length (8-16 characters)
            if (password.length >= 8 && password.length <= 16) {
                reqLength.classList.add('valid');
                reqLength.classList.remove('invalid');
                reqLength.querySelector('i').classList.remove('fa-circle');
                reqLength.querySelector('i').classList.add('fa-check-circle');
            } else {
                reqLength.classList.remove('valid');
                reqLength.classList.add('invalid');
                reqLength.querySelector('i').classList.add('fa-circle');
                reqLength.querySelector('i').classList.remove('fa-check-circle');
            }

            // Check special character
            const specialChars = /[!@#$%^&*(),.?":{}|<>]/;
            if (specialChars.test(password)) {
                reqSpecial.classList.add('valid');
                reqSpecial.classList.remove('invalid');
                reqSpecial.querySelector('i').classList.remove('fa-circle');
                reqSpecial.querySelector('i').classList.add('fa-check-circle');
            } else {
                reqSpecial.classList.remove('valid');
                reqSpecial.classList.add('invalid');
                reqSpecial.querySelector('i').classList.add('fa-circle');
                reqSpecial.querySelector('i').classList.remove('fa-check-circle');
            }
        });

        // Show alert message
        function showAlert(message, type = 'error') {
            const alert = document.getElementById('registerAlert');
            const alertMessage = document.getElementById('alertMessage');

            alert.className = `alert alert-${type}`;
            alertMessage.textContent = message;
            alert.style.display = 'block';

            if (type === 'error') {
                alert.classList.add('animate-shake');
                setTimeout(() => alert.classList.remove('animate-shake'), 500);
            }
        }

        // Hide alert
        function hideAlert() {
            document.getElementById('registerAlert').style.display = 'none';
        }

        // Set loading state
        function setLoading(loading) {
            const btn = document.getElementById('registerBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            if (loading) {
                btn.disabled = true;
                btnText.textContent = 'Creating Account...';
                btnSpinner.classList.remove('d-none');
            } else {
                btn.disabled = false;
                btnText.textContent = 'Create Account';
                btnSpinner.classList.add('d-none');
            }
        }

        // Validate password
        function validatePassword(password) {
            if (password.length < 8) {
                return { valid: false, error: 'Password must be at least 8 characters' };
            }
            if (password.length > 16) {
                return { valid: false, error: 'Password must not exceed 16 characters' };
            }
            const specialChars = /[!@#$%^&*(),.?":{}|<>]/;
            if (!specialChars.test(password)) {
                return { valid: false, error: 'Password must contain at least 1 special character' };
            }
            return { valid: true };
        }

        // Handle form submission
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            hideAlert();

            const name = document.getElementById('name').value.trim();
            const username = document.getElementById('username').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const age = document.getElementById('age').value ? parseInt(document.getElementById('age').value) : null;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (!name || !username || !password) {
                showAlert('Please fill in all required fields.');
                return;
            }

            if (username.length < 3) {
                showAlert('Username must be at least 3 characters.');
                return;
            }

            // Validate password
            const passwordCheck = validatePassword(password);
            if (!passwordCheck.valid) {
                showAlert(passwordCheck.error);
                return;
            }

            // Validate age (1-120)
            if (age !== null) {
                if (age < 1 || age > 120) {
                    showAlert('Age must be between 1 and 120.');
                    return;
                }
            }

            // Validate phone number (exactly 10 digits)
            if (phone) {
                if (!/^\d{10}$/.test(phone)) {
                    showAlert('Phone number must be exactly 10 digits.');
                    return;
                }
            }

            if (password !== confirmPassword) {
                showAlert('Passwords do not match.');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name,
                        username,
                        phone: phone || null,
                        age,
                        password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Account created successfully! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showAlert(data.error || 'Registration failed. Please try again.');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('Network error. Please check your connection.');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
