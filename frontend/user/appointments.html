<!DOCTYPE html>
<!-- =============================================
     QueueSense - My Appointments Page
     ============================================= -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments - QueueSense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">

    <style>
        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--gradient-dark);
            padding: 1.5rem;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 0 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            font-size: 1.25rem;
            font-weight: 700;
        }

        .sidebar-brand i {
            color: var(--neon-green);
            font-size: 1.5rem;
        }

        .sidebar-nav {
            margin-top: 1.5rem;
        }

        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            color: var(--text-purple-light);
            border-radius: var(--radius-sm);
            margin-bottom: 0.5rem;
            transition: all 0.3s;
            text-decoration: none;
        }

        .sidebar-nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
        }

        .sidebar-nav-item.active {
            background: rgba(57, 255, 20, 0.15);
            color: var(--neon-green);
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem;
            background: var(--light-gray);
            min-height: 100vh;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 1.75rem;
            color: var(--text-dark);
            background: none;
            -webkit-text-fill-color: initial;
        }

        .appointments-list {
            display: grid;
            gap: 1rem;
        }

        .appointment-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s;
        }

        .appointment-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .appointment-date {
            width: 70px;
            height: 70px;
            background: var(--gradient-primary);
            border-radius: var(--radius-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .appointment-date .day {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1;
        }

        .appointment-date .month {
            font-size: 0.85rem;
        }

        .appointment-info {
            flex: 1;
            padding: 0 1.5rem;
        }

        .appointment-info h3 {
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }

        .appointment-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        .appointment-info .time {
            color: var(--primary-purple);
            font-weight: 600;
        }

        .appointment-actions {
            display: flex;
            gap: 0.5rem;
        }

        .appointment-actions .btn {
            padding: 0.5rem 1rem;
        }

        .status-badge {
            padding: 0.375rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-badge.scheduled {
            background: rgba(74, 144, 226, 0.15);
            color: var(--primary-blue);
        }

        .status-badge.completed {
            background: rgba(57, 255, 20, 0.15);
            color: var(--neon-green-dark);
        }

        .status-badge.cancelled {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .status-badge.checked_in {
            background: rgba(139, 92, 246, 0.15);
            color: var(--primary-purple);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: var(--radius-md);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--text-muted);
            opacity: 0.3;
            margin-bottom: 1rem;
        }

        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .filter-tab {
            padding: 0.5rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-full);
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-tab:hover {
            border-color: var(--primary-purple);
        }

        .filter-tab.active {
            background: var(--primary-purple);
            color: white;
            border-color: var(--primary-purple);
        }

        .sidebar-footer {
            position: absolute;
            bottom: 1.5rem;
            left: 1.5rem;
            right: 1.5rem;
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            color: #ef4444;
            border-radius: var(--radius-sm);
            cursor: pointer;
            width: 100%;
            background: none;
            border: none;
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-layer-group"></i>
                <span>QueueSense</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="join-queue.html" class="sidebar-nav-item"><i class="fas fa-users-line"></i><span>Join
                        Queue</span></a>
                <a href="appointments.html" class="sidebar-nav-item active"><i
                        class="fas fa-calendar-check"></i><span>My Appointments</span></a>
                <a href="book.html" class="sidebar-nav-item"><i class="fas fa-calendar-plus"></i><span>Book
                        Appointment</span></a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="Auth.logout()"><i
                        class="fas fa-sign-out-alt"></i><span>Logout</span></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h1><i class="fas fa-calendar-check"></i> My Appointments</h1>
                    <p class="text-muted mb-0">Manage your scheduled appointments</p>
                </div>
                <a href="book.html" class="btn btn-primary"><i class="fas fa-plus"></i> Book New</a>
            </div>

            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="upcoming">Upcoming</button>
                <button class="filter-tab" data-filter="completed">Completed</button>
                <button class="filter-tab" data-filter="cancelled">Cancelled</button>
                <button class="filter-tab" data-filter="all">All</button>
            </div>

            <div class="appointments-list" id="appointmentsList">
                <div class="empty-state">
                    <i class="fas fa-calendar-xmark"></i>
                    <h3>No appointments</h3>
                    <p class="text-muted">Book your first appointment to get started</p>
                    <a href="book.html" class="btn btn-primary mt-3">Book Now</a>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>

    <script>
        let currentFilter = 'upcoming';



        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.isLoggedIn()) { window.location.href = '../login.html'; return; }
            await loadAppointments();

            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentFilter = tab.dataset.filter;
                    loadAppointments();
                });
            });
        });

        async function loadAppointments() {
            const params = currentFilter === 'all' ? {} :
                currentFilter === 'upcoming' ? { upcoming: 'true' } :
                    { status: currentFilter };

            const response = await API.Appointments.getMy(params);
            if (response.ok) {
                renderAppointments(response.data.appointments);
            }
        }

        function renderAppointments(appointments) {
            const list = document.getElementById('appointmentsList');

            if (appointments.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-calendar-xmark"></i>
                        <h3>No ${currentFilter} appointments</h3>
                        <a href="book.html" class="btn btn-primary mt-3">Book Now</a>
                    </div>
                `;
                return;
            }

            list.innerHTML = appointments.map(apt => {
                const date = new Date(apt.appointment_date);
                return `
                    <div class="appointment-card">
                        <div class="appointment-date">
                            <span class="day">${date.getDate()}</span>
                            <span class="month">${date.toLocaleDateString('en', { month: 'short' })}</span>
                        </div>
                        <div class="appointment-info">
                            <h3>${translateService(apt.service_name)}</h3>
                            <p>${apt.location_name || 'Location'}</p>
                            <p class="time"><i class="fas fa-clock"></i> ${apt.time_window_start || '--:--'} - ${apt.time_window_end || '--:--'}</p>
                        </div>
                        <span class="status-badge ${apt.status}">${apt.status}</span>
                        <div class="appointment-actions">
                            ${apt.status === 'scheduled' ? `
                                <button class="btn btn-primary btn-sm" onclick="checkIn(${apt.appointment_id})">
                                    <i class="fas fa-check"></i> Check In
                                </button>
                                <button class="btn btn-outline-danger btn-sm" onclick="cancelApt(${apt.appointment_id})">
                                    Cancel
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function checkIn(aptId) {
            const response = await API.Appointments.checkIn(aptId);
            if (response.ok) {
                Toast.success('Checked in! You have been added to the queue.');
                loadAppointments();
            } else {
                Toast.error(response.data.error || 'Failed to check in');
            }
        }

        async function cancelApt(aptId) {
            Modal.confirm('Cancel this appointment?', async () => {
                const response = await API.Appointments.cancel(aptId);
                if (response.ok) {
                    Toast.info('Appointment cancelled');
                    loadAppointments();
                } else {
                    Toast.error('Failed to cancel');
                }
            });
        }
    </script>
</body>

</html>
