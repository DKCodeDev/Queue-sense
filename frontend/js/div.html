<!DOCTYPE html>
<html>
<head>
    <title>Responsive Div Example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        .container {
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
        }

        .box {
            flex: 1 1 300px;
            margin: 10px;
            padding: 40px;
            text-align: center;
            color: white;
            font-size: 20px;
        }

        .box1 { background-color: #3498db; }


        @media (max-width: 768px) {
            .box {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .container {
                flex-direction: column;
            }

            .box {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="box box1">Box 1</div>
</div>

</body>
</html>
